<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#B0BEC5"/>
  <rect y="360" width="800" height="140" fill="#78909C"/>
  <!-- old/dilapidated buildings -->
  <rect x="0" y="100" width="250" height="260" fill="#757575"/>
  <rect x="30" y="140" width="40" height="50" fill="#424242" opacity="0.5"/>
  <rect x="100" y="150" width="35" height="45" fill="#424242" opacity="0.4"/>
  <rect x="550" y="80" width="250" height="280" fill="#616161"/>
  <rect x="580" y="120" width="45" height="55" fill="#37474F" opacity="0.5"/>
  <!-- graffiti / wear -->
  <rect x="180" y="200" width="120" height="80" fill="#9E9E9E" opacity="0.6" rx="4"/>
  <text x="240" y="250" text-anchor="middle" fill="#616161" font-size="12" font-family="sans-serif">9 M</text>
  <!-- bare tree -->
  <rect x="390" y="280" width="20" height="80" fill="#5D4037"/>
  <line x1="400" y1="280" x2="360" y2="230" stroke="#6D4C41" stroke-width="4"/>
  <line x1="400" y1="270" x2="440" y2="220" stroke="#6D4C41" stroke-width="4"/>
  <line x1="400" y1="290" x2="370" y2="250" stroke="#6D4C41" stroke-width="3"/>
  <!-- trash bin -->
  <rect x="320" y="330" width="30" height="35" fill="#455A64" rx="3"/>
  <text x="400" y="480" text-anchor="middle" fill="#37474F" font-family="sans-serif" font-size="14" font-weight="600">9 M · çW:</text>
</svg>
