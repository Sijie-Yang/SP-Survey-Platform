<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky3)"/>
  <rect y="360" width="800" height="140" fill="#757575"/>
  <!-- narrow alley walls -->
  <polygon points="0,500 0,100 280,180 280,500" fill="#8D6E63"/>
  <polygon points="800,500 800,80 520,160 520,500" fill="#6D4C41"/>
  <!-- brick texture hints -->
  <g opacity="0.15" fill="#3E2723">
    <rect x="20" y="200" width="240" height="8"/><rect x="20" y="240" width="240" height="8"/>
    <rect x="20" y="280" width="240" height="8"/><rect x="20" y="320" width="240" height="8"/>
    <rect x="540" y="190" width="240" height="8"/><rect x="540" y="230" width="240" height="8"/>
    <rect x="540" y="270" width="240" height="8"/>
  </g>
  <!-- vanishing perspective road -->
  <polygon points="340,500 400,360 460,500" fill="#616161"/>
  <line x1="400" y1="360" x2="400" y2="500" stroke="#FFF" stroke-width="3" stroke-dasharray="12 8" opacity="0.5"/>
  <!-- windows -->
  <rect x="60" y="220" width="30" height="40" fill="#FFECB3" opacity="0.8"/>
  <rect x="110" y="250" width="28" height="35" fill="#FFE082" opacity="0.6"/>
  <rect x="170" y="210" width="32" height="42" fill="#FFECB3" opacity="0.7"/>
  <rect x="580" y="200" width="30" height="38" fill="#FFF9C4" opacity="0.75"/>
  <rect x="640" y="230" width="28" height="36" fill="#FFE082" opacity="0.65"/>
  <rect x="700" y="190" width="32" height="44" fill="#FFECB3" opacity="0.8"/>
  <!-- overhead wires -->
  <path d="M0,160 Q400,120 800,150" stroke="#424242" stroke-width="2" fill="none"/>
  <path d="M0,175 Q400,135 800,165" stroke="#424242" stroke-width="1.5" fill="none"/>
  <!-- person walking away -->
  <ellipse cx="400" cy="390" rx="12" ry="12" fill="#37474F"/>
  <rect x="392" y="402" width="16" height="35" fill="#37474F" rx="5"/>
  <!-- puddle reflection -->
  <ellipse cx="400" cy="440" rx="60" ry="8" fill="#90A4AE" opacity="0.4"/>
  <text x="400" y="485" text-anchor="middle" fill="#455A64" font-family="sans-serif" font-size="14" font-weight="600">:‹Wo C · į÷</text>
</svg>
