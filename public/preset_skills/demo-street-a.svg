<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect y="340" width="800" height="160" fill="url(#road)"/>
  <rect y="330" width="800" height="12" fill="#455A64"/>
  <!-- buildings left -->
  <rect x="0" y="120" width="180" height="220" fill="#90A4AE"/>
  <rect x="20" y="150" width="40" height="50" fill="#FFF9C4" opacity="0.9"/>
  <rect x="80" y="160" width="35" height="40" fill="#FFF9C4" opacity="0.7"/>
  <rect x="130" y="140" width="30" height="55" fill="#FFF9C4" opacity="0.85"/>
  <rect x="190" y="80" width="140" height="260" fill="#B0BEC5"/>
  <rect x="210" y="110" width="45" height="60" fill="#FFECB3"/>
  <rect x="270" y="120" width="40" height="45" fill="#FFECB3"/>
  <!-- buildings right -->
  <rect x="480" y="100" width="160" height="240" fill="#A1887F"/>
  <rect x="500" y="130" width="35" height="50" fill="#FFE082"/>
  <rect x="560" y="140" width="40" height="45" fill="#FFE082"/>
  <rect x="660" y="90" width="140" height="250" fill="#78909C"/>
  <rect x="680" y="120" width="40" height="55" fill="#FFF59D"/>
  <!-- trees -->
  <ellipse cx="420" cy="300" rx="55" ry="70" fill="#43A047"/>
  <rect x="408" y="300" width="24" height="45" fill="#6D4C41"/>
  <ellipse cx="370" cy="315" rx="40" ry="55" fill="#66BB6A"/>
  <rect x="362" y="315" width="16" height="30" fill="#6D4C41"/>
  <!-- street lane marks -->
  <rect x="350" y="395" width="100" height="8" fill="#FFF" opacity="0.6" rx="2"/>
  <rect x="350" y="430" width="100" height="8" fill="#FFF" opacity="0.6" rx="2"/>
  <!-- people silhouettes -->
  <ellipse cx="300" cy="355" rx="10" ry="10" fill="#37474F"/>
  <rect x="294" y="365" width="12" height="28" fill="#37474F" rx="4"/>
  <ellipse cx="520" cy="360" rx="10" ry="10" fill="#455A64"/>
  <rect x="514" y="370" width="12" height="26" fill="#455A64" rx="4"/>
  <text x="400" y="480" text-anchor="middle" fill="#1976D2" font-family="sans-serif" font-size="14" font-weight="600">:őWo A Ě ╬;rS</text>
</svg>
